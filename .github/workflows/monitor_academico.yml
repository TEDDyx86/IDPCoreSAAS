name: IDP Core Monitoring Agent 🎓

on:
  schedule:
    - cron: '0 */6 * * *' # Roda a cada 6 horas
  workflow_dispatch: # Permite rodar manualmente pelo site do GitHub

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Run IDP Core Orchestrator
        env:
          USUARIO_FACUL: ${{ secrets.USUARIO_FACUL }}
          SENHA_FACUL: ${{ secrets.SENHA_FACUL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_ACTIONS: "true"
          HEADLESS: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python orchestrator.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "IDP Core Bot"
          git config --global user.email "bot@idpcore.ai"
          git add config.json .tmp/ github_detectados.json resumos/ dashboard/src/data/
          git diff --quiet \u0026\u0026 git diff --staged --quiet || (git commit -m "Auto-sync: Novos materiais detectados 🎓" \u0026\u0026 git push)
